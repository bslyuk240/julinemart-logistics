[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# -------------------------------------------------
# VITE DEV ASSETS (MUST COME FIRST)
# -------------------------------------------------

[[redirects]]
  from = "/src/*"
  to = "/src/:splat"
  status = 200

[[redirects]]
  from = "/@vite/*"
  to = "/@vite/:splat"
  status = 200

[[redirects]]
  from = "/@react-refresh/*"
  to = "/@react-refresh/:splat"
  status = 200

[[redirects]]
  from = "/node_modules/*"
  to = "/node_modules/:splat"
  status = 200

# -------------------------------------------------
# API ROUTES
# -------------------------------------------------

[[redirects]]
  from = "/api/returns/:id/tracking"
  to = "/.netlify/functions/get-return-tracking"
  status = 200

[[redirects]]
  from = "/api/return-shipments/:id/tracking"
  to = "/.netlify/functions/add-return-tracking"
  status = 200

[[redirects]]
  from = "/api/return-shipments/order/:orderId"
  to = "/.netlify/functions/get-order-returns"
  status = 200

[[redirects]]
  from = "/api/refund-queue"
  to = "/.netlify/functions/returns-queue"
  status = 200

[[redirects]]
  from = "/api/returns-queue"
  to = "/.netlify/functions/returns-queue"
  status = 200

[[redirects]]
  from = "/api/admin-approve-return"
  to = "/.netlify/functions/admin-approve-return"
  status = 200

[[redirects]]
  from = "/api/admin/notifications/send"
  to = "/.netlify/functions/admin-notifications-send"
  status = 200

[[redirects]]
  from = "/api/admin/vendor-debits"
  to = "/.netlify/functions/admin-vendor-debits"
  status = 200

[[redirects]]
  from = "/api/meta/*"
  to = "/.netlify/functions/meta-ads"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# -------------------------------------------------
# SPA FALLBACK (MUST BE LAST)
# -------------------------------------------------

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# -------------------------------------------------
# ENVIRONMENT
# -------------------------------------------------

[build.environment]
  NODE_VERSION = "20.11.0"

# -------------------------------------------------
# HEADERS
# -------------------------------------------------

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[headers]]
  for = "/admin"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/login"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/forgot-password"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/reset-password"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

# -------------------------------------------------
# FUNCTIONS
# -------------------------------------------------

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/services/**", "shared/**"]
  external_node_modules = ["pdfkit"]

[functions."meta-ads"]
  timeout = 60

[functions."product-moderation-list"]
  timeout = 30

[functions."product-moderation-detail"]
  timeout = 30

[functions."product-moderation-update"]
  timeout = 30

[functions."product-moderation-meta"]
  timeout = 20

[functions."woo-migrate-catalog"]
  timeout = 60

[functions."catalog-products"]
  timeout = 15

[functions."catalog-product"]
  timeout = 15

[functions."catalog-homepage"]
  timeout = 10

[functions."create-order"]
  timeout = 30

[functions."notify-order-confirmation"]
  timeout = 30

[functions."paystack-webhook"]
  timeout = 10

[functions."vendor-sync-profiles"]
  timeout = 26

[functions."vendor-invite"]
  timeout = 15

[functions."verify-payment"]
  timeout = 15

[functions."fx-price-sync"]
  timeout = 26

[functions."fx-price-sync-scheduled"]
  timeout = 120
  schedule = "@weekly"

[functions."vendor-returns"]
  timeout = 20

[functions."admin-approve-return"]
  timeout = 60

[functions."returns-queue"]
  timeout = 20

[functions."admin-return-inspection"]
  timeout = 60

[functions."admin-vendor-debits"]
  timeout = 30

# -------------------------------------------------
# EDGE FUNCTIONS
# -------------------------------------------------

[[edge_functions]]
  function = "cors"
  path = "/api/*"

[[edge_functions]]
  function = "cors"
  path = "/.netlify/functions/*"

# -------------------------------------------------
# NETLIFY DEV
# -------------------------------------------------

[dev]
  command = "npm run dev -- --host 0.0.0.0 --port 3000"
  targetPort = 3000
  port = 8888
