<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- White circle background -->
  <circle cx="32" cy="32" r="31" fill="#ffffff" stroke="#6b0080" stroke-width="2.5"/>

  <!-- Purple bottom wave -->
  <path d="M1 44 Q16 38 32 44 Q48 50 63 44 L63 62 Q48 56 32 62 Q16 56 1 62 Z" fill="#6b0080"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="#6b0080" stroke-width="2.5"/>

  <!-- Shopping cart body -->
  <rect x="22" y="20" width="18" height="13" rx="2" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Cart handle/bar -->
  <line x1="18" y1="20" x2="22" y2="20" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="20" y2="20" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cart wheels -->
  <circle cx="25" cy="36" r="2" fill="#f97316"/>
  <circle cx="37" cy="36" r="2" fill="#f97316"/>

  <!-- JULINE text -->
  <text x="32" y="52" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="9.5" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">JULINE</text>
</svg>
